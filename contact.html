<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <form>
        
        <div>
        <label for="fname">First Name</label>
        <input type="text" id="fname" name="fname" placeholder="Jack">
        </div>

        <br>

        <div>
        <label for="fsurname">Last Name</label>
        <input type="text" id="fsurname" name="fsurname" placeholder="Doe">
        </div>

        <br>

        <div>
        <label for="fmail">Sender's Email</label>
        <input type="text" id="fmail" name="fmail" placeholder="jackdoe@email.com">
        </div>

        <br>

        <div>
            <input type="reset">
        </div>

        <br>

        <div>
            <input type="submit">
        </div>


    </form>
</body>
</html>
